name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      arch:
        description: 'Target CPU architecture'
        required: true
        default: 'Intel'
        type: choice
        options: [ Intel, AMD ]

jobs:
  build:
    runs-on: windows-2025

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Cache submodules
        id: cache-submodules
        uses: actions/cache@v4
        with:
          path: |
            uefi-boot/ext/edk2/src
            uefi-boot/ext/openssl
          key: submodules-${{ hashFiles('.gitmodules') }}

      - name: Clone submodules
        if: steps.cache-submodules.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/ionescu007/edk2.git uefi-boot/ext/edk2/src
          git clone --branch OpenSSL_1_1_0-stable https://github.com/openssl/openssl.git uefi-boot/ext/openssl

      - name: Cache NASM
        id: cache-nasm
        uses: actions/cache@v4
        with:
          path: C:\Program Files\NASM
          key: nasm-2.16

      - name: Install NASM
        if: steps.cache-nasm.outputs.cache-hit != 'true'
        run: choco install nasm -y

      - name: Set NASM_PREFIX
        run: echo "NASM_PREFIX=C:\Program Files\NASM\" >> $env:GITHUB_ENV

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Cache vcpkg packages
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-${{ hashFiles('usermode/vcpkg.json') }}

      - name: Install vcpkg dependencies
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        run: |
          vcpkg install keystone:x64-windows zydis:x64-windows spdlog:x64-windows cli11:x64-windows

      - name: vcpkg integrate
        run: vcpkg integrate install

      - name: Cache EDK2 build output
        id: cache-edk2
        uses: actions/cache@v4
        with:
          path: uefi-boot/ext/edk2/build/x64
          key: edk2-${{ hashFiles('uefi-boot/ext/edk2/src/**') }}

      - name: Build EDK2 libraries
        if: steps.cache-edk2.outputs.cache-hit != 'true'
        run: |
          msbuild uefi-boot/ext/edk2/build/EDK-II.sln `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /m `
            /v:minimal

      - name: Set architecture (Intel)
        if: ${{ github.event.inputs.arch != 'AMD' }}
        run: |
          $file = "hyperv-attachment/src/arch_config.h"
          (Get-Content $file) -replace '//\s*#define _INTELMACHINE', '#define _INTELMACHINE' | Set-Content $file

      - name: Set architecture (AMD)
        if: ${{ github.event.inputs.arch == 'AMD' }}
        run: |
          $file = "hyperv-attachment/src/arch_config.h"
          (Get-Content $file) -replace '^#define _INTELMACHINE', '//#define _INTELMACHINE' | Set-Content $file

      - name: Build solution (Release|x64)
        run: |
          msbuild hyper-reV.sln `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /m `
            /v:minimal

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hyper-reV-${{ github.event.inputs.arch || 'Intel' }}
          path: |
            build/x64/Release/*.sys
            build/x64/Release/*.dll
            build/x64/Release/*.efi
            build/x64/Release/*.exe
          if-no-files-found: warn
